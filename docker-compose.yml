services:
  django:
    build: .
    networks:
      - local
    volumes:
      - ./webapp:/webapp
    ports:
      - "8000:8000"
      - "11434:11434"
    env_file:
      - ./.env
    depends_on:
      - neo4j
      # - postgres

  react:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - local
    volumes:
      - ./frontend:/app
    command: npm start
    ports:
      - "3000:3000"

  neo4j:
    networks:
      - local
    image: neo4j:5.23.0
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    env_file:
      - ./.env

